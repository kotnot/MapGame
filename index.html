<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MapGame - 3D Sandbox with Interactive Displays</title>
    <link rel="icon" type="image/png" href="логотип.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
            touch-action: none;
        }
        
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        /* Главное меню */
        #main-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #main-menu.hidden { display: none; }
        
        .menu-container {
            text-align: center;
            max-width: 500px;
            width: 90%;
            padding: 35px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 30px;
            border: 2px solid #4cc9f0;
        }
        
        .game-title {
            font-size: 52px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ff6b6b, #4cc9f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .game-subtitle { color: #aaa; margin-bottom: 30px; font-size: 14px; }
        
        .mode-buttons { display: flex; flex-direction: column; gap: 15px; margin: 30px 0; }
        
        .mode-btn {
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }
        
        .mode-btn.survival { background: linear-gradient(45deg, #2ecc71, #27ae60); }
        .mode-btn.creative { background: linear-gradient(45deg, #9b59b6, #8e44ad); }
        .mode-btn:hover { transform: scale(1.02); }
        
        /* Панель строительства */
        #build-panel {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 12px;
            z-index: 150;
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            max-width: 95%;
            backdrop-filter: blur(10px);
        }
        
        .build-item {
            width: 65px;
            height: 65px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #555;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .build-item:hover, .build-item.selected {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.3);
            transform: scale(1.05);
        }
        
        .build-item .emoji { font-size: 28px; }
        .build-item .name { font-size: 9px; margin-top: 4px; }
        
        /* HTML Дисплей (всплывающее окно) */
        #display-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .display-window {
            width: 90%;
            max-width: 800px;
            height: 80%;
            background: #1a1a2e;
            border: 3px solid #4cc9f0;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .display-header {
            background: #0a0a1a;
            padding: 15px;
            border-bottom: 1px solid #4cc9f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .display-title {
            font-size: 18px;
            color: #ffd700;
        }
        
        .display-close {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .display-edit-mode {
            background: #2ecc71;
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 10px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .display-content {
            flex: 1;
            padding: 0;
            background: white;
        }
        
        .display-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Подсказка взаимодействия */
        #interact-hint {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            color: #ffd700;
            z-index: 150;
            display: none;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid #ffd700;
        }
        
        /* Панель оружия */
        #weapon-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 8px 15px;
            text-align: center;
            z-index: 100;
        }
        
        #weapon-name { font-size: 12px; color: #ffd700; margin-bottom: 3px; }
        #ammo-counter { font-size: 22px; font-weight: bold; color: white; font-family: monospace; }
        
        /* Кнопки управления */
        #menu-button {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #4cc9f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 200;
        }
        
        #build-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 55px;
            height: 55px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            z-index: 200;
        }
        
        #shoot-btn {
            position: fixed;
            bottom: 20px;
            right: 100px;
            width: 70px;
            height: 70px;
            background: rgba(255, 50, 50, 0.9);
            border: 3px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            z-index: 200;
        }
        
        #reload-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 55px;
            height: 55px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #4cc9f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 200;
        }
        
        /* Джойстик */
        #joystick-container {
            position: fixed;
            bottom: 100px;
            left: 30px;
            width: 120px;
            height: 120px;
            border-radius: 60px;
            background: rgba(0, 0, 0, 0.4);
            z-index: 200;
            display: none;
        }
        
        #joystick-base {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.5);
            top: 10px;
            left: 10px;
        }
        
        #joystick-thumb {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: rgba(255, 215, 0, 0.8);
            border: 2px solid white;
            top: 35px;
            left: 35px;
            cursor: pointer;
        }
        
        #game-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .menu-btn {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: linear-gradient(45deg, #4361ee, #4cc9f0);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .menu-btn.secondary { background: linear-gradient(45deg, #2ecc71, #27ae60); }
        .menu-btn.danger { background: linear-gradient(45deg, #e74c3c, #c0392b); }
        
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            pointer-events: none;
            z-index: 100;
        }
        
        .crosshair-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        
        .crosshair-line {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        .crosshair-line.top { width: 2px; height: 12px; top: 0; left: 50%; transform: translateX(-50%); }
        .crosshair-line.bottom { width: 2px; height: 12px; bottom: 0; left: 50%; transform: translateX(-50%); }
        .crosshair-line.left { width: 12px; height: 2px; left: 0; top: 50%; transform: translateY(-50%); }
        .crosshair-line.right { width: 12px; height: 2px; right: 0; top: 50%; transform: translateY(-50%); }
        
        #health-bar {
            position: fixed;
            top: 20px;
            left: 80px;
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #ff4757;
            border-radius: 10px;
            overflow: hidden;
            z-index: 100;
        }
        
        #health-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #2ecc71, #f39c12, #e74c3c);
            transition: width 0.3s;
        }
        
        #stats-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 12px;
            z-index: 100;
        }
        
        #mode-indicator {
            position: fixed;
            top: 55px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
            z-index: 100;
        }
        
        #message-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            border: 3px solid gold;
            border-radius: 20px;
            padding: 15px 30px;
            display: none;
            z-index: 1000;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            #joystick-container { display: block; }
            #build-toggle, #menu-button, #shoot-btn, #reload-btn { width: 50px; height: 50px; font-size: 22px; }
            #shoot-btn { width: 65px; height: 65px; font-size: 28px; right: 90px; }
            .build-item { width: 55px; height: 55px; }
            .build-item .emoji { font-size: 24px; }
            #interact-hint { font-size: 11px; white-space: nowrap; bottom: 100px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="main-menu">
        <div class="menu-container">
            <div class="game-title">🗺️ MAPGAME</div>
            <div class="game-subtitle">3D Sandbox with Interactive Displays</div>
            <div class="mode-buttons">
                <button class="mode-btn survival" onclick="startGame('survival')">⚔️ РЕЖИМ ВЫЖИВАНИЯ</button>
                <button class="mode-btn creative" onclick="startGame('creative')">🎨 КРЕАТИВНЫЙ РЕЖИМ</button>
            </div>
            <a href="https://kotnot.github.io/Perfectic-inc-site">
                <button>Сайт Разработчика</button>
            </a>
        </div>
    </div>
    
    <div id="game-menu">
        <div class="menu-container">
            <div class="game-title" style="font-size: 32px;">МЕНЮ</div>
            <div style="margin: 20px 0; text-align: left;">
                <p><strong>🎯 Убийств:</strong> <span id="menu-kills">0</span></p>
                <p><strong>💀 Смертей:</strong> <span id="menu-deaths">0</span></p>
                <p><strong>🎮 Режим:</strong> <span id="menu-mode">-</span></p>
            </div>
            <button id="save-map-btn" class="menu-btn secondary">💾 Сохранить карту (.mg)</button>
            <button id="load-map-input-btn" class="menu-btn secondary">📂 Загрузить карту</button>
            <input type="file" id="load-map-file" accept=".mg" style="display: none;">
            <button id="restart-btn" class="menu-btn">🔄 Перезапустить</button>
            <button id="menu-to-mode-btn" class="menu-btn danger">🏠 В главное меню</button>
            <button id="resume-btn" class="menu-btn">▶ Продолжить</button>
        </div>
    </div>
    
    <!-- HTML Дисплей -->
    <div id="display-overlay">
        <div class="display-window">
            <div class="display-header">
                <span class="display-title" id="display-title">📺 HTML ДИСПЛЕЙ</span>
                <div>
                    <button class="display-edit-mode" id="display-edit-btn">✏️ Режим редактирования</button>
                    <button class="display-close" onclick="closeDisplay()">✖️ Закрыть</button>
                </div>
            </div>
            <div class="display-content">
                <iframe id="display-iframe" srcdoc="<html style='background:#1a1a2e;color:white;display:flex;justify-content:center;align-items:center;height:100%;margin:0;font-family:Arial'><div style='text-align:center'><h1>📺 HTML Дисплей</h1><p>Размер: 15x10 блоков</p><p>Нажмите G для редактирования</p><p>Нажмите B для просмотра</p></div></html>"></iframe>
            </div>
        </div>
    </div>
    
    <canvas id="game-canvas"></canvas>
    
    <!-- Мобильные кнопки -->
    <div id="menu-button" onclick="toggleMenu()">☰</div>
    <div id="build-toggle" onclick="toggleBuildPanel()">🏗️</div>
    <div id="shoot-btn" onclick="handleShoot()">🔫</div>
    <div id="reload-btn" onclick="handleReload()">🔄</div>
    
    <!-- Джойстик -->
    <div id="joystick-container">
        <div id="joystick-base"></div>
        <div id="joystick-thumb"></div>
    </div>
    
    <div id="build-panel">
        <div class="build-item" data-block="grass" onclick="selectBlock('grass')"><div class="emoji">🌿</div><div class="name">Трава</div></div>
        <div class="build-item" data-block="stone" onclick="selectBlock('stone')"><div class="emoji">🪨</div><div class="name">Камень</div></div>
        <div class="build-item" data-block="wood" onclick="selectBlock('wood')"><div class="emoji">🪵</div><div class="name">Дерево</div></div>
        <div class="build-item" data-block="brick" onclick="selectBlock('brick')"><div class="emoji">🧱</div><div class="name">Кирпич</div></div>
        <div class="build-item" data-block="glass" onclick="selectBlock('glass')"><div class="emoji">🔷</div><div class="name">Стекло</div></div>
        <div class="build-item" data-block="gold" onclick="selectBlock('gold')"><div class="emoji">💰</div><div class="name">Золото</div></div>
        <div class="build-item" data-block="display" onclick="selectBlock('display')"><div class="emoji">📺</div><div class="name">Дисплей</div></div>
        <div class="build-item" data-block="delete" onclick="selectBlock('delete')"><div class="emoji">❌</div><div class="name">Удалить</div></div>
    </div>
    
    <div id="crosshair">
        <div class="crosshair-dot"></div>
        <div class="crosshair-line top"></div>
        <div class="crosshair-line bottom"></div>
        <div class="crosshair-line left"></div>
        <div class="crosshair-line right"></div>
    </div>
    
    <div id="interact-hint">📺 Нажмите G - редактировать | B - просмотреть</div>
    
    <div id="health-bar"><div id="health-fill"></div></div>
    <div id="stats-panel">🎯 <span id="kills-count">0</span> | 💀 <span id="deaths-count">0</span></div>
    <div id="mode-indicator">🎮 <span id="mode-name">-</span></div>
    <div id="weapon-panel"><div id="weapon-name">🔫 ПИСТОЛЕТ</div><div><span id="ammo-counter">30</span><span id="ammo-max">/30</span></div></div>
    <div id="message-panel"><div id="message-text"></div></div>

    <script>
        // ==================== КОНФИГУРАЦИЯ ====================
        let gameMode = 'creative';
        let creativeMode = true;
        let selectedBlock = 'grass';
        
        const BLOCKS = {
            grass: { color: 0x2ecc71, name: 'Трава', emoji: '🌿' },
            stone: { color: 0x7f8c8d, name: 'Камень', emoji: '🪨' },
            wood: { color: 0xA0522D, name: 'Дерево', emoji: '🪵' },
            brick: { color: 0xc0392b, name: 'Кирпич', emoji: '🧱' },
            glass: { color: 0x3498db, name: 'Стекло', emoji: '🔷', transparent: true, opacity: 0.6 },
            gold: { color: 0xf1c40f, name: 'Золото', emoji: '💰' },
            display: { color: 0x4cc9f0, name: 'Дисплей', emoji: '📺' }
        };
        
        const WEAPONS = {
            pistol: { name: 'Пистолет', damage: 25, ammo: 30, maxAmmo: 30, fireRate: 300, reloadTime: 1000, spread: 0.05, emoji: '🔫' },
            rifle: { name: 'Винтовка', damage: 40, ammo: 20, maxAmmo: 20, fireRate: 150, reloadTime: 2000, spread: 0.02, emoji: '🔫🔫' },
            shotgun: { name: 'Дробовик', damage: 15, ammo: 8, maxAmmo: 8, fireRate: 800, reloadTime: 1500, spread: 0.2, pellets: 5, emoji: '🔫🔫🔫' }
        };
        
        // ==================== ПЕРЕМЕННЫЕ ====================
        let scene, camera, renderer, raycaster;
        let blocks = new Map();
        let displays = new Map(); // Блоки дисплеев с HTML содержимым
        let enemies = [];
        let currentLookingDisplay = null;
        let editMode = false; // Режим редактирования дисплея
        
        let player = {
            position: { x: 0, y: 5, z: 0 },
            rotation: { x: 0, y: 0 },
            velocity: { x: 0, y: 0, z: 0 },
            onGround: true,
            health: 100,
            maxHealth: 100,
            kills: 0,
            deaths: 0,
            weapon: { type: 'pistol', ammo: 30, maxAmmo: 30, reloading: false, lastShot: 0 }
        };
        
        let keys = { w: false, s: false, a: false, d: false, space: false, shift: false };
        let pointerLocked = false;
        let menuVisible = false;
        let aiming = false;
        let moveX = 0, moveZ = 0;
        
        // ==================== КЛАСС ДИСПЛЕЯ ====================
        class InteractiveDisplay {
            constructor(x, y, z, htmlContent = null) {
                this.x = x;
                this.y = y;
                this.z = z;
                this.width = 15;
                this.height = 10;
                this.htmlContent = htmlContent || this.getDefaultHTML();
                this.mesh = null;
                this.createMesh();
            }
            
            getDefaultHTML() {
                return `<!DOCTYPE html>
                <html>
                <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
                <style>
                    * { margin: 0; padding: 0; box-sizing: border-box; }
                    body {
                        background: linear-gradient(135deg, #0a0a1a, #1a1a2e);
                        color: white;
                        font-family: 'Segoe UI', Arial, sans-serif;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        height: 100vh;
                        overflow: hidden;
                    }
                    .content {
                        text-align: center;
                        padding: 20px;
                    }
                    h1 { color: #ffd700; margin-bottom: 20px; font-size: 24px; }
                    p { margin: 10px 0; font-size: 14px; }
                    .info { background: rgba(76, 201, 240, 0.2); padding: 15px; border-radius: 10px; margin-top: 20px; }
                    button {
                        background: #4cc9f0;
                        border: none;
                        padding: 10px 20px;
                        border-radius: 10px;
                        color: white;
                        cursor: pointer;
                        margin: 5px;
                    }
                    button:hover { background: #ffd700; color: #0a0a1a; }
                </style>
                </head>
                <body>
                    <div class="content">
                        <h1>📺 ИНТЕРАКТИВНЫЙ ДИСПЛЕЙ</h1>
                        <p>Размер экрана: 15x10 блоков</p>
                        <div class="info">
                            <p>✨ Нажмите <strong>G</strong> для редактирования этого дисплея</p>
                            <p>👁️ Нажмите <strong>B</strong> для просмотра без редактирования</p>
                            <p>🎮 Вы можете менять HTML/CSS/JavaScript код!</p>
                        </div>
                        <button onclick="alert('Привет из дисплея! 🎉')">Тестовая кнопка</button>
                    </div>
                </body>
                </html>`;
            }
            
            createMesh() {
                const group = new THREE.Group();
                
                // Рамка дисплея
                const frameGeo = new THREE.BoxGeometry(this.width, this.height, 0.2);
                const frameMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
                const frame = new THREE.Mesh(frameGeo, frameMat);
                frame.castShadow = true;
                group.add(frame);
                
                // Экран (светящийся)
                const screenGeo = new THREE.BoxGeometry(this.width - 0.8, this.height - 0.8, 0.15);
                const screenMat = new THREE.MeshStandardMaterial({ color: 0x4cc9f0, emissive: 0x1a3a5a, emissiveIntensity: 0.5 });
                const screen = new THREE.Mesh(screenGeo, screenMat);
                screen.position.z = 0.1;
                screen.castShadow = true;
                group.add(screen);
                
                group.position.set(this.x + 0.5, this.y + this.height/2, this.z + 0.5);
                group.userData = { isDisplay: true, displayId: `${this.x},${this.y},${this.z}` };
                scene.add(group);
                this.mesh = group;
            }
            
            updateHTML(newHTML) {
                this.htmlContent = newHTML;
            }
            
            openDisplay(isEditMode) {
                editMode = isEditMode;
                document.getElementById('display-title').textContent = `📺 ДИСПЛЕЙ ${isEditMode ? '(РЕДАКТИРОВАНИЕ)' : '(ПРОСМОТР)'}`;
                const iframe = document.getElementById('display-iframe');
                iframe.srcdoc = this.htmlContent;
                document.getElementById('display-overlay').style.display = 'flex';
                
                // Если режим редактирования, добавляем возможность редактирования
                if (isEditMode) {
                    document.getElementById('display-edit-btn').style.display = 'inline-block';
                    document.getElementById('display-edit-btn').textContent = '✏️ Редактировать HTML';
                    document.getElementById('display-edit-btn').onclick = () => this.editHTML();
                } else {
                    document.getElementById('display-edit-btn').style.display = 'none';
                }
            }
            
            editHTML() {
                const newHTML = prompt('Введите HTML код для дисплея (15x10 блоков):', this.htmlContent);
                if (newHTML !== null) {
                    this.htmlContent = newHTML;
                    document.getElementById('display-iframe').srcdoc = this.htmlContent;
                    showMessage('HTML дисплея обновлен!');
                }
            }
        }
        
        // ==================== КЛАСС ВРАГА ====================
        class Enemy {
            constructor(id, x, z, type = 'zombie') {
                this.id = id;
                this.type = type;
                this.health = creativeMode ? 30 : (type === 'zombie' ? 50 : 80);
                this.maxHealth = this.health;
                this.damage = creativeMode ? 5 : (type === 'zombie' ? 15 : 25);
                this.speed = creativeMode ? 0.02 : 0.04;
                this.position = { x: x, y: 1, z: z };
                this.lastAttack = 0;
                this.mesh = null;
                this.createMesh();
            }
            
            createMesh() {
                const group = new THREE.Group();
                const bodyMat = new THREE.MeshStandardMaterial({ color: this.type === 'zombie' ? 0x44aa44 : 0xaa4444 });
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.8), bodyMat);
                body.position.y = 0.6;
                body.castShadow = true;
                group.add(body);
                
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshStandardMaterial({ color: this.type === 'zombie' ? 0x88cc88 : 0xcc8888 }));
                head.position.y = 1.3;
                head.castShadow = true;
                group.add(head);
                
                const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
                const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
                leftEye.position.set(-0.2, 1.45, 0.45);
                const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
                rightEye.position.set(0.2, 1.45, 0.45);
                group.add(leftEye);
                group.add(rightEye);
                
                group.position.set(this.position.x, this.position.y, this.position.z);
                group.userData = { isEnemy: true, enemyId: this.id };
                scene.add(group);
                this.mesh = group;
            }
            
            takeDamage(amount) {
                this.health -= amount;
                if (this.health <= 0) {
                    if (this.mesh) scene.remove(this.mesh);
                    const index = enemies.indexOf(this);
                    if (index !== -1) enemies.splice(index, 1);
                    if (!creativeMode) {
                        player.kills++;
                        updateStatsUI();
                        showMessage(`+1 убийство!`);
                    }
                    return true;
                }
                return false;
            }
            
            update(targetPos) {
                if (creativeMode) return;
                
                const dx = targetPos.x - this.position.x;
                const dz = targetPos.z - this.position.z;
                const dist = Math.hypot(dx, dz);
                if (dist > 0.5 && dist < 15) {
                    const moveX = (dx / dist) * this.speed;
                    const moveZ = (dz / dist) * this.speed;
                    this.position.x += moveX;
                    this.position.z += moveZ;
                }
                
                if (this.mesh) {
                    this.mesh.rotation.y = Math.atan2(dx, dz);
                    this.mesh.position.set(this.position.x, this.position.y, this.position.z);
                }
                
                if (dist < 1.2 && !creativeMode) {
                    const now = Date.now();
                    if (now - this.lastAttack > 1000) {
                        this.lastAttack = now;
                        player.health = Math.max(0, player.health - this.damage);
                        updateHealthUI();
                        if (player.health <= 0) {
                            player.deaths++;
                            player.health = player.maxHealth;
                            player.position = { x: 0, y: 5, z: 0 };
                            updateHealthUI();
                            updateStatsUI();
                            showMessage(`Вы погибли! Возрождение...`);
                        }
                    }
                }
            }
        }
        
        // ==================== ТРИДЭ ====================
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a2a);
            scene.fog = new THREE.FogExp2(0x0a0a2a, 0.008);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
            sunLight.position.set(30, 50, 20);
            sunLight.castShadow = true;
            scene.add(sunLight);
            
            raycaster = new THREE.Raycaster();
        }
        
        function addBlock(x, y, z, type) {
            if (!BLOCKS[type]) return false;
            const key = `${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`;
            if (blocks.has(key)) return false;
            
            const geometry = new THREE.BoxGeometry(0.96, 0.96, 0.96);
            const material = new THREE.MeshStandardMaterial({ color: BLOCKS[type].color });
            if (BLOCKS[type].transparent) material.transparent = true;
            if (BLOCKS[type].opacity) material.opacity = BLOCKS[type].opacity;
            
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(Math.floor(x) + 0.5, Math.floor(y) + 0.5, Math.floor(z) + 0.5);
            cube.castShadow = true;
            cube.receiveShadow = true;
            cube.userData = { type, key, isBlock: true };
            scene.add(cube);
            blocks.set(key, { type, mesh: cube, x: Math.floor(x), y: Math.floor(y), z: Math.floor(z) });
            
            // Если это дисплей, создаем интерактивный объект
            if (type === 'display') {
                const display = new InteractiveDisplay(Math.floor(x), Math.floor(y), Math.floor(z));
                displays.set(key, display);
            }
            
            return true;
        }
        
        function removeBlock(x, y, z) {
            const key = `${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`;
            const block = blocks.get(key);
            if (block) {
                // Если удаляем дисплей, удаляем и его интерактивный объект
                if (block.type === 'display' && displays.has(key)) {
                    const display = displays.get(key);
                    if (display.mesh) scene.remove(display.mesh);
                    displays.delete(key);
                }
                scene.remove(block.mesh);
                blocks.delete(key);
                return true;
            }
            return false;
        }
        
        function createBaseTerrain() {
            for (let x = -25; x < 25; x++) {
                for (let z = -25; z < 25; z++) {
                    addBlock(x, 0, z, 'stone');
                    addBlock(x, 1, z, 'grass');
                }
            }
            
            // Пример дисплея для демонстрации
            addBlock(5, 2, 5, 'display');
        }
        
        // ==================== БИЛДИНГ ====================
        function buildAtCrosshair() {
            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyQuaternion(camera.quaternion);
            raycaster.set(camera.position, direction);
            
            const intersects = raycaster.intersectObjects(scene.children);
            let hitPoint = null;
            let hitNormal = null;
            
            for (const hit of intersects) {
                if (hit.object.userData.isBlock) {
                    hitPoint = hit.point;
                    hitNormal = hit.face.normal;
                    break;
                }
            }
            
            if (hitPoint && hitNormal) {
                let newX = Math.floor(hitPoint.x - hitNormal.x * 0.5);
                let newY = Math.floor(hitPoint.y - hitNormal.y * 0.5);
                let newZ = Math.floor(hitPoint.z - hitNormal.z * 0.5);
                
                if (selectedBlock === 'delete') {
                    if (removeBlock(newX, newY, newZ)) {
                        showMessage('Блок удален');
                    }
                } else if (BLOCKS[selectedBlock]) {
                    if (addBlock(newX, newY, newZ, selectedBlock)) {
                        showMessage(`Поставлен ${BLOCKS[selectedBlock].name}`);
                    }
                }
            }
        }
        
        // ==================== ВЗАИМОДЕЙСТВИЕ С ДИСПЛЕЕМ ====================
        function checkLookingAtDisplay() {
            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyQuaternion(camera.quaternion);
            raycaster.set(camera.position, direction);
            
            const intersects = raycaster.intersectObjects(scene.children);
            for (const hit of intersects) {
                if (hit.object.userData.isDisplay) {
                    const displayId = hit.object.userData.displayId;
                    const display = displays.get(displayId);
                    if (display) {
                        currentLookingDisplay = display;
                        document.getElementById('interact-hint').style.display = 'block';
                        return;
                    }
                }
            }
            currentLookingDisplay = null;
            document.getElementById('interact-hint').style.display = 'none';
        }
        
        function interactWithDisplay(editModeFlag) {
            if (currentLookingDisplay) {
                currentLookingDisplay.openDisplay(editModeFlag);
                if (pointerLocked) document.exitPointerLock();
            } else {
                showMessage('Нет дисплея перед вами!');
            }
        }
        
        function closeDisplay() {
            document.getElementById('display-overlay').style.display = 'none';
            if (!menuVisible && !pointerLocked) {
                renderer.domElement.requestPointerLock();
            }
        }
        
        // ==================== ОРУЖИЕ ====================
        function shoot() {
            const now = Date.now();
            const weapon = WEAPONS[player.weapon.type];
            
            if (!creativeMode && now - player.weapon.lastShot < weapon.fireRate) return;
            if (!creativeMode && player.weapon.ammo <= 0) { handleReload(); return; }
            if (!creativeMode && player.weapon.reloading) return;
            
            if (!creativeMode) player.weapon.ammo--;
            player.weapon.lastShot = now;
            updateWeaponUI();
            
            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyQuaternion(camera.quaternion);
            
            let spread = weapon.spread;
            if (aiming) spread *= 0.5;
            
            if (spread > 0) {
                direction.x += (Math.random() - 0.5) * spread;
                direction.y += (Math.random() - 0.5) * spread;
                direction.z += (Math.random() - 0.5) * spread;
                direction.normalize();
            }
            
            raycaster.set(camera.position, direction);
            
            let hitEnemy = null;
            let hitDistance = Infinity;
            
            enemies.forEach(enemy => {
                if (!enemy.mesh) return;
                const enemyBounds = new THREE.Box3().setFromObject(enemy.mesh);
                const ray = new THREE.Ray(camera.position, direction);
                const intersect = ray.intersectBox(enemyBounds, new THREE.Vector3());
                if (intersect) {
                    const dist = camera.position.distanceTo(intersect);
                    if (dist < hitDistance) {
                        hitDistance = dist;
                        hitEnemy = enemy;
                    }
                }
            });
            
            if (hitEnemy) {
                let damage = weapon.damage;
                if (aiming) damage *= 1.2;
                
                if (weapon.pellets) {
                    for (let i = 0; i < weapon.pellets; i++) hitEnemy.takeDamage(damage);
                } else {
                    hitEnemy.takeDamage(damage);
                }
                createHitEffect(camera.position.clone().add(direction.clone().multiplyScalar(hitDistance)));
            }
            
            createMuzzleFlash();
        }
        
        function handleReload() {
            if (creativeMode) return;
            if (player.weapon.reloading) return;
            const weapon = WEAPONS[player.weapon.type];
            if (player.weapon.ammo === weapon.maxAmmo) return;
            
            player.weapon.reloading = true;
            showMessage('Перезарядка...');
            setTimeout(() => {
                player.weapon.ammo = weapon.maxAmmo;
                player.weapon.reloading = false;
                updateWeaponUI();
                showMessage('Готово!');
            }, weapon.reloadTime);
        }
        
        function createHitEffect(position) {
            const geometry = new THREE.SphereGeometry(0.15, 6, 6);
            const material = new THREE.MeshBasicMaterial({ color: 0xff6600 });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.copy(position);
            scene.add(sphere);
            setTimeout(() => scene.remove(sphere), 100);
        }
        
        function createMuzzleFlash() {
            const light = new THREE.PointLight(0xffaa00, 1.5, 10);
            light.position.copy(camera.position);
            light.position.add(new THREE.Vector3(0, 0, -0.5).applyQuaternion(camera.quaternion));
            scene.add(light);
            setTimeout(() => scene.remove(light), 50);
        }
        
        function updateWeaponUI() {
            const weapon = WEAPONS[player.weapon.type];
            document.getElementById('weapon-name').innerHTML = `${weapon.emoji} ${weapon.name}`;
            document.getElementById('ammo-counter').textContent = creativeMode ? '∞' : player.weapon.ammo;
            document.getElementById('ammo-max').textContent = creativeMode ? '' : `/${weapon.maxAmmo}`;
        }
        
        // ==================== UI ====================
        function updateHealthUI() {
            const percent = (player.health / player.maxHealth) * 100;
            document.getElementById('health-fill').style.width = percent + '%';
        }
        
        function updateStatsUI() {
            document.getElementById('kills-count').textContent = player.kills;
            document.getElementById('deaths-count').textContent = player.deaths;
        }
        
        function showMessage(text, duration = 1500) {
            const panel = document.getElementById('message-panel');
            const msg = document.getElementById('message-text');
            msg.textContent = text;
            panel.style.display = 'block';
            setTimeout(() => panel.style.display = 'none', duration);
        }
        
        function selectBlock(block) {
            selectedBlock = block;
            document.querySelectorAll('.build-item').forEach(el => el.classList.remove('selected'));
            document.querySelector(`.build-item[data-block="${block}"]`)?.classList.add('selected');
            showMessage(`Выбран: ${BLOCKS[block]?.name || 'Удаление'}`);
        }
        
        function toggleBuildPanel() {
            const panel = document.getElementById('build-panel');
            panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
        }
        
        function handleShoot() { shoot(); }
        
        // ==================== ДВИЖЕНИЕ ====================
        function updateMovement() {
            if (!pointerLocked || menuVisible) return;
            
            const speed = creativeMode ? (aiming ? 0.15 : 0.25) : (aiming ? 0.045 : 0.09);
            let mx = moveX, mz = moveZ;
            if (keys.w) mz = -1;
            if (keys.s) mz = 1;
            if (keys.a) mx = -1;
            if (keys.d) mx = 1;
            
            if (mx !== 0 || mz !== 0) {
                const angle = player.rotation.y;
                const sin = Math.sin(angle);
                const cos = Math.cos(angle);
                player.position.x += (mx * cos - mz * sin) * speed;
                player.position.z += (mx * sin + mz * cos) * speed;
            }
            
            if (!creativeMode) {
                if (keys.space && player.onGround) {
                    player.velocity.y = 0.22;
                    player.onGround = false;
                }
                player.velocity.y -= 0.018;
                player.position.y += player.velocity.y;
                
                const groundY = 1.6;
                if (player.position.y < groundY) {
                    player.position.y = groundY;
                    player.velocity.y = 0;
                    player.onGround = true;
                }
            } else {
                if (keys.space) player.position.y += 0.2;
                if (keys.shift) player.position.y -= 0.2;
            }
            
            camera.position.set(player.position.x, player.position.y + 1.6, player.position.z);
            camera.fov = aiming ? 45 : 75;
            camera.updateProjectionMatrix();
        }
        
        // ==================== СОХРАНЕНИЕ/ЗАГРУЗКА ====================
        function saveMap() {
            const displayData = [];
            displays.forEach((display, key) => {
                displayData.push({
                    key: key,
                    x: display.x,
                    y: display.y,
                    z: display.z,
                    htmlContent: display.htmlContent
                });
            });
            
            const mapData = {
                version: 3,
                mode: gameMode,
                blocks: Array.from(blocks.values()).map(b => ({ x: b.x, y: b.y, z: b.z, type: b.type })),
                displays: displayData
            };
            const json = JSON.stringify(mapData);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `mapgame_${new Date().toISOString().slice(0,19)}.mg`;
            a.click();
            URL.revokeObjectURL(url);
            showMessage('Карта сохранена!');
        }
        
        function loadMap(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const mapData = JSON.parse(e.target.result);
                    blocks.forEach(block => scene.remove(block.mesh));
                    blocks.clear();
                    displays.clear();
                    
                    mapData.blocks.forEach(block => {
                        addBlock(block.x, block.y, block.z, block.type);
                    });
                    
                    if (mapData.displays) {
                        mapData.displays.forEach(dispData => {
                            const key = dispData.key;
                            if (blocks.has(key)) {
                                const display = new InteractiveDisplay(dispData.x, dispData.y, dispData.z, dispData.htmlContent);
                                displays.set(key, display);
                            }
                        });
                    }
                    
                    showMessage(`Карта загружена! Блоков: ${mapData.blocks.length}, Дисплеев: ${mapData.displays?.length || 0}`);
                } catch (err) {
                    showMessage('Ошибка загрузки карты!');
                }
            };
            reader.readAsText(file);
        }
        
        // ==================== СОБЫТИЯ ====================
        function setupEvents() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            // Клавиатура
            document.addEventListener('keydown', (e) => {
                if (e.code === 'KeyW') keys.w = true;
                if (e.code === 'KeyS') keys.s = true;
                if (e.code === 'KeyA') keys.a = true;
                if (e.code === 'KeyD') keys.d = true;
                if (e.code === 'Space') keys.space = true;
                if (e.code === 'ShiftLeft') keys.shift = true;
                if (e.code === 'KeyG') { interactWithDisplay(true); e.preventDefault(); }
                if (e.code === 'KeyB') { interactWithDisplay(false); e.preventDefault(); }
                if (e.code === 'KeyQ') { toggleBuildPanel(); e.preventDefault(); }
                if (e.code === 'KeyR') { handleReload(); e.preventDefault(); }
                if (e.code === 'Escape') { 
                    if (document.getElementById('display-overlay').style.display === 'flex') {
                        closeDisplay();
                    } else {
                        toggleMenu();
                    }
                    e.preventDefault();
                }
            });
            
            document.addEventListener('keyup', (e) => {
                if (e.code === 'KeyW') keys.w = false;
                if (e.code === 'KeyS') keys.s = false;
                if (e.code === 'KeyA') keys.a = false;
                if (e.code === 'KeyD') keys.d = false;
                if (e.code === 'Space') keys.space = false;
                if (e.code === 'ShiftLeft') keys.shift = false;
            });
            
            // Мышь
            document.addEventListener('mousemove', (e) => {
                if (pointerLocked && !menuVisible && document.getElementById('display-overlay').style.display !== 'flex') {
                    player.rotation.y -= e.movementX * 0.002 * 1.5;
                    player.rotation.x -= e.movementY * 0.002 * 1.5;
                    player.rotation.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, player.rotation.x));
                    camera.rotation.order = 'YXZ';
                    camera.rotation.y = player.rotation.y;
                    camera.rotation.x = player.rotation.x;
                    checkLookingAtDisplay();
                }
            });
            
            document.addEventListener('mousedown', (e) => {
                if (e.button === 0 && pointerLocked && !menuVisible && document.getElementById('display-overlay').style.display !== 'flex') { 
                    buildAtCrosshair(); 
                    e.preventDefault(); 
                }
                if (e.button === 2 && pointerLocked && !menuVisible) { aiming = true; e.preventDefault(); }
            });
            
            document.addEventListener('mouseup', (e) => { if (e.button === 2) aiming = false; });
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            
            document.addEventListener('pointerlockchange', () => {
                pointerLocked = document.pointerLockElement === renderer.domElement;
                document.getElementById('crosshair').style.display = pointerLocked ? 'block' : 'none';
                if (!pointerLocked) aiming = false;
            });
            
            renderer.domElement.addEventListener('click', () => {
                if (!pointerLocked && !menuVisible && document.getElementById('main-menu').classList.contains('hidden') && document.getElementById('display-overlay').style.display !== 'flex') {
                    renderer.domElement.requestPointerLock();
                }
            });
            
            // Джойстик для мобильных
            const joystick = document.getElementById('joystick-thumb');
            const joystickBase = document.getElementById('joystick-base');
            let activeTouch = false;
            
            joystick.addEventListener('touchstart', (e) => { activeTouch = true; e.preventDefault(); });
            
            document.addEventListener('touchmove', (e) => {
                if (!activeTouch) return;
                const touch = e.touches[0];
                const rect = joystickBase.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                const maxDist = 40;
                if (Math.hypot(dx, dy) > maxDist) {
                    dx = dx / Math.hypot(dx, dy) * maxDist;
                    dy = dy / Math.hypot(dx, dy) * maxDist;
                }
                joystick.style.transform = `translate(${dx}px, ${dy}px)`;
                moveX = dx / maxDist;
                moveZ = dy / maxDist;
                e.preventDefault();
            });
            
            document.addEventListener('touchend', () => {
                activeTouch = false;
                joystick.style.transform = 'translate(0px, 0px)';
                moveX = 0;
                moveZ = 0;
            });
        }
        
        function toggleMenu() {
            menuVisible = !menuVisible;
            document.getElementById('game-menu').style.display = menuVisible ? 'flex' : 'none';
            if (menuVisible) {
                document.exitPointerLock();
                document.getElementById('menu-kills').textContent = player.kills;
                document.getElementById('menu-deaths').textContent = player.deaths;
                document.getElementById('menu-mode').textContent = creativeMode ? 'КРЕАТИВ' : 'ВЫЖИВАНИЕ';
            } else {
                renderer.domElement.requestPointerLock();
            }
        }
        
        function restartGame() {
            blocks.forEach(block => scene.remove(block.mesh));
            blocks.clear();
            enemies.forEach(e => { if(e.mesh) scene.remove(e.mesh); });
            enemies = [];
            displays.clear();
            
            player.position = { x: 0, y: 5, z: 0 };
            player.health = creativeMode ? 999 : 100;
            player.maxHealth = creativeMode ? 999 : 100;
            player.kills = 0;
            player.deaths = 0;
            player.weapon = { type: 'pistol', ammo: 30, maxAmmo: 30, reloading: false, lastShot: 0 };
            
            createBaseTerrain();
            updateHealthUI();
            updateWeaponUI();
            updateStatsUI();
            showMessage('Игра перезапущена!');
        }
        
        function startGame(mode) {
            gameMode = mode;
            creativeMode = (mode === 'creative');
            
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('mode-name').textContent = creativeMode ? '🎨 КРЕАТИВ' : '⚔️ ВЫЖИВАНИЕ';
            
            player.health = creativeMode ? 999 : 100;
            player.maxHealth = creativeMode ? 999 : 100;
            
            initThree();
            createBaseTerrain();
            setupEvents();
            
            updateHealthUI();
            updateWeaponUI();
            updateStatsUI();
            
            function animate() {
                requestAnimationFrame(animate);
                updateMovement();
                enemies.forEach(enemy => enemy.update(player.position));
                renderer.render(scene, camera);
            }
            animate();
        }
        
        // Инициализация кнопок
        document.getElementById('resume-btn').onclick = () => toggleMenu();
        document.getElementById('restart-btn').onclick = () => { toggleMenu(); restartGame(); };
        document.getElementById('menu-to-mode-btn').onclick = () => { location.reload(); };
        document.getElementById('save-map-btn').onclick = () => { saveMap(); toggleMenu(); };
        document.getElementById('load-map-input-btn').onclick = () => { document.getElementById('load-map-file').click(); toggleMenu(); };
        document.getElementById('load-map-file').onchange = (e) => { if(e.target.files[0]) loadMap(e.target.files[0]); };
        
        selectBlock('grass');
    </script>
</body>
</html>
